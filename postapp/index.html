<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Replace your current bootstrap link with this one line inside your <head> -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


    <div class="form-div">
        <form>
            <label id="formHeading" aria-hidden="true">Login</label> <br> <br>
            <button class="google" onclick="signUpWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Continue with Google
            </button>
            <div class="mb-2 name-row" id="nameRow" style="display: none;">
                <input type="text" class="form-control" id="fullname" placeholder="full name">
            </div>

            <div class="mb-2">
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-2">
                <input type="password" class="form-control" id="password" placeholder="password">
            </div>

            <div class="mb-2 flex btn-row">
                <!-- <span id="toggleText"></span>  -->
                <button type="button" id="submitBtn">Log in</button>
            </div>
        </form>

        <p class="text-center mt-3 small text-white">
            <span id="toggleText">Don't have an account?</span>
            <span class="text-center toggle-link" id="toggleBtn" style="color: #22d3ee; cursor: pointer;">Create Account
            </span>

            <!-- <span id="toggleText">Don't have an account?</span>  -->

        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <script src="auth.js"></script>

</body>

</html>
