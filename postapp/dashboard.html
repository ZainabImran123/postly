<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title><!-- Replace your current bootstrap link with this one line inside your <head> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1 text-white">POST APP</span>
      <div class="d-flex" role="search">
        <input class="form-control me-2" type="search" id="searchInput" placeholder="Search" aria-label="Search" />
        <button class="btn btn-outline-light" type="submit" onclick="searchPosts()">Search</button>
        <!-- <button id="char" class="btn btn-outline-light" type="button">Dummy</button> -->
        <div class="profile-dropdown">

          <button id="char" class="btn btn-outline-light" onclick="toggleMenu()">
            Z
          </button>

          <div id="dropdownMenu" class="dropdown-content">
            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>


      </div>
    </div>
    </div>

    </div>
    </div>
  </nav>


  <div class="container">
    <div class="row">
      <div class="col-sm-12 col-md-6 col-lg-4">
        <div class="card p-3 m-3">
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text"></div>
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
          </div>

          <div class="mb-3 d-flex images justify-content-around">
            <img class="bgImg" onclick="selectImg('images/first.jpg',event)" src="images/first.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/second.webp',event)" src="images/second.webp" alt="">
            <img class="bgImg" onclick="selectImg('images/third.webp',event)" src="images/third.webp" alt="">
            <img class="bgImg" onclick="selectImg('images/forth.jpg',event)" src="images/forth.jpg" alt="">
            <!-- <img class="bgImg" onclick="selectImg('images/fifth.jpg',event)" src="images/fifth.jpg" alt=""> -->
            <label class="btn btn-dark" for="background-image">+</label>
            <input type="file" id="background-image" class="d-none" accept="image/*">
          </div>

          <button onclick="post()" type="submit" id="postBtn" class="btn btn-primary ms-auto">Post</button>
        </div>
      </div>
      <div class="col-sm-12 col-md-6 col-lg-8">
        <div id="posts" class="posts m-2"></div>
      </div>

    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Replace your current bootstrap link with this one line inside your <head> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="app.js"></script>
</body>

</html>
