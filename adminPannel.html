<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="adminPannel.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2>Admin Panel</h2>

        <ul>
          <li onclick="showDashboard()">Dashboard</li>
          <li onclick="loadPosts()">Manage Posts</li>
          <li onclick="loadUsers()">Manage Users</li>
          <li onclick="logout()">Logout</li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="main">
        <h1>Dashboard</h1>

        <div class="cards">
          <div class="card">
            <h3>Total Users</h3>
            <p id="totalUsers">0</p>
          </div>

          <div class="card">
            <h3>Total Posts</h3>
            <p id="totalPosts">0</p>
          </div>
        </div>

        <div id="mainContent">
          <h2>Posts</h2>

        <div id="posts"></div>
        </div>
      </div>
    </div>

    <script type="module" src="adminPannel.js"></script>
  </body>
</html>
